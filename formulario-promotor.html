<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Formulario de Relevamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --surface2: #EEF2F7;
    --border: #D1DCE8;
    --accent: #1B5FA8;
    --accent2: #E67E22;
    --text: #0F2A4A;
    --muted: #64748B;
    --success: #16A34A;
    --error: #DC2626;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(27,95,168,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; right: -10%;
    width: 50%; height: 50%;
    background: radial-gradient(ellipse, rgba(230,126,34,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
    animation: slideUp 0.6s ease forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 32px;
    text-align: center;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(27,95,168,0.08);
    border: 1px solid rgba(27,95,168,0.2);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .header-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  h1 { color: var(--text); text-align: center; }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 300;
    text-align: center;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(15,42,74,0.08);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(27,95,168,0.5), transparent);
  }

  /* Fields */
  .field {
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }
  .field:nth-child(1) { animation-delay: 0.05s; }
  .field:nth-child(2) { animation-delay: 0.10s; }
  .field:nth-child(3) { animation-delay: 0.15s; }
  .field:nth-child(4) { animation-delay: 0.20s; }
  .field:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  label .req { color: var(--accent2); margin-left: 2px; }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    background: #1e2d44;
  }
  input::placeholder { color: var(--muted); }
  select { cursor: pointer; }
  select option { background: var(--surface2); }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  /* Grid for 2 cols */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Geo Button */
  .geo-section {
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease 0.3s forwards;
    opacity: 0;
  }
  .geo-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(27,95,168,0.06);
    border: 1px dashed rgba(27,95,168,0.3);
    border-radius: 12px;
    padding: 15px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .geo-btn:hover {
    background: rgba(27,95,168,0.12);
    border-style: solid;
    transform: translateY(-1px);
  }
  .geo-btn:active { transform: translateY(0); }
  .geo-btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }
  .geo-btn svg { flex-shrink: 0; }

  .geo-result {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .geo-result.ok {
    display: flex;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--success);
  }
  .geo-result.err {
    display: flex;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.2);
    color: var(--error);
  }
  .geo-coords {
    font-size: 11px;
    opacity: 0.8;
    font-family: monospace;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease 0.35s forwards;
    opacity: 0;
  }
  .submit-btn:hover {
    background: #33dcff;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.25);
  }
  .submit-btn:active { transform: translateY(0); }

  /* Success overlay */
  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  .success-icon {
    width: 80px; height: 80px;
    background: rgba(0,229,160,0.1);
    border: 2px solid var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  .success-overlay h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--success);
  }
  .success-overlay p { color: var(--muted); font-size: 14px; }
  .reset-btn {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 24px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(27,95,168,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .loading .spinner { display: block; }
  .loading .geo-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    body { padding: 12px; }
    .card { padding: 20px 16px; border-radius: 14px; }
    .grid-2 { grid-template-columns: 1fr; gap: 0; }
    h1 { font-size: 24px; }
    .header { margin-bottom: 20px; }
    input, select, textarea { font-size: 16px; padding: 12px 14px; } /* 16px evita zoom en iOS */
    .submit-btn { padding: 16px; font-size: 16px; border-radius: 10px; }
    .geo-btn { padding: 14px; font-size: 14px; }
    label { font-size: 10px; }
  }
  /* Mejoras táctiles generales */
  input, select, textarea, button {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  select { background-image: none; }
</style>
</head>

            <option>GALLO JONATHAN</option>
            <option>GEREZ JONATHAN</option>
            <option>GOMEZ GUSTAVO</option>

        </div>
        <div class="field">
          <label>MARCA QUE LLEVA LA HELADERA <span class="req">*</span></label>
          <input type="text" id="tipoLogo" placeholder="Ej: Quilmes, Brahma, Stella..." required>
        </div>

      <div class="field">
        <label>EDF <span class="req">*</span></label>
        <input type="text" id="edf" placeholder="Ingresá el EDF" required>
      </div>

      <!-- FALLA SUGERIDA -->
      <div class="field">
        <label>Falla Sugerida <span class="req">*</span></label>
        <textarea id="fallaSugerida" placeholder="Describí la falla sugerida..." required></textarea>
      </div>

      <div class="divider"></div>

        <input type="hidden" id="latitud" name="latitud">
        <input type="hidden" id="longitud" name="longitud">
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="submit-btn">Enviar Registro →</button>

    </form>

  <h2>¡Registro Enviado!</h2>
  <p>El formulario fue completado y enviado correctamente.</p>
  <div id="summaryText" style="color: var(--muted); font-size: 12px; margin-top: 4px; font-family: monospace; background: var(--surface2); padding: 12px 16px; border-radius: 8px; text-align: left; line-height: 1.8;"></div>
  <button class="reset-btn" onclick="resetForm()">Nuevo Registro</button>
</div>

<script>
  let geoData = null;

  function geolocate() {
    const btn = document.getElementById('geoBtn');
    const result = document.getElementById('geoResult');

    if (!navigator.geolocation) {
      result.className = 'geo-result err';
      result.innerHTML = '✕ Tu navegador no soporta geolocalización.';
      return;
    }

    btn.classList.add('loading');
    result.className = 'geo-result';

    let bestPos = null;
    let readings = 0;
    const MAX_READINGS = 4;
    const MIN_ACCURACY = 50; // metros — si llegamos a esto, paramos antes
    let watchId = null;
    let timeoutId = null;

    function updateBtn(msg) {
      const span = btn.querySelector('span');
      if (span) span.textContent = msg;
    }

    function done(pos) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (timeoutId) clearTimeout(timeoutId);

      const lat = pos.coords.latitude.toFixed(6).replace(',','.');
      const lng = pos.coords.longitude.toFixed(6).replace(',','.');
      const acc = Math.round(pos.coords.accuracy);
      geoData = { lat, lng, acc };
      document.getElementById('latitud').value = lat;
      document.getElementById('longitud').value = lng;

      btn.classList.remove('loading');

      // Color del indicador según precisión
      const accColor = acc <= 20 ? 'var(--success)' : acc <= 50 ? '#D97706' : 'var(--error)';
      const accLabel = acc <= 20 ? 'Muy preciso' : acc <= 50 ? 'Aceptable' : 'Baja precisión';

      result.className = 'geo-result ok';
      result.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <div>
          Ubicación capturada
          <span class="geo-coords">Lat: ${lat} | Lng: ${lng}</span>
          <span style="display:block;margin-top:3px;font-size:11px;font-weight:700;color:${accColor}">
            ± ${acc}m · ${accLabel}
          </span>
        </div>`;
    }

    function fail(err) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (timeoutId) clearTimeout(timeoutId);

      // Si ya teníamos algo, usarlo igual
      if (bestPos) { done(bestPos); return; }

      btn.classList.remove('loading');
      result.className = 'geo-result err';
      const msgs = {
        1: 'Permiso denegado. Habilitá la ubicación en Configuración.',
        2: 'No se pudo obtener ubicación. Verificá que el GPS esté activo.',
        3: 'Tiempo agotado. Intentá en un lugar más abierto.'
      };
      result.innerHTML = `✕ ${msgs[err.code] || 'Error desconocido. Intentá de nuevo.'}`;
    }

    // Usamos watchPosition para tomar varias lecturas y quedarnos con la mejor
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        readings++;
        updateBtn(`Mejorando precisión... (${readings}/${MAX_READINGS})`);

        if (!bestPos || pos.coords.accuracy < bestPos.coords.accuracy) {
          bestPos = pos;
        }

        // Parar si llegamos a buena precisión o al máximo de lecturas
        if (pos.coords.accuracy <= MIN_ACCURACY || readings >= MAX_READINGS) {
          done(bestPos);
        }
      },
      fail,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );

    // Timeout total de 20 segundos
    timeoutId = setTimeout(() => {
      if (bestPos) { done(bestPos); }
      else { fail({ code: 3 }); }
    }, 20000);
  }

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuKwoNm1lg_m8To20FKNuzxNcMmHDZV4nTCz6to4ACk28ZmmuucnHSv2iMfBwpuLGQ/exec';

  document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fields = [
      { id: 'promotor', label: 'Promotor' },
      { id: 'codigoCliente', label: 'Código de Cliente' },
      { id: 'tipoLogo', label: 'Tipo de Logo' },
      { id: 'edf', label: 'EDF' },
      { id: 'fallaSugerida', label: 'Falla Sugerida' },
    ];

    let valid = true;
    fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el.value.trim()) {
        el.style.borderColor = 'var(--error)';
        el.style.boxShadow = '0 0 0 3px rgba(255,77,109,0.15)';
        valid = false;
        el.addEventListener('input', () => {
          el.style.borderColor = '';
          el.style.boxShadow = '';
        }, { once: true });
      }
    });

    if (!valid) {
      const firstErr = document.querySelector('[style*="error"]');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const payload = {
      timestamp: new Date().toISOString(),
      promotor: document.getElementById('promotor').value,
      rol: 'promotor',
      cliente: document.getElementById('codigoCliente').value,
      marca: document.getElementById('tipoLogo').value,
      edf: document.getElementById('edf').value,
      falla: document.getElementById('fallaSugerida').value,
      lat: geoData ? geoData.lat : '',
      lng: geoData ? geoData.lng : '',
      foto: '',
      notas: ''
    };

    // Enviar en segundo plano sin esperar respuesta
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });

    // Mostrar éxito inmediatamente
    const summary = `
PROMOTOR: ${payload.promotor}
CÓDIGO CLIENTE: ${payload.cliente}
MARCA HELADERA: ${payload.marca}
EDF: ${payload.edf}
FALLA SUGERIDA: ${payload.falla}
UBICACIÓN: ${geoData ? `Lat ${geoData.lat}, Lng ${geoData.lng}` : 'No capturada'}
    `.trim();

    document.getElementById('summaryText').textContent = summary;
    document.getElementById('successOverlay').classList.add('show');
  });

  function resetForm() {
    document.getElementById('mainForm').reset();
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('geoResult').className = 'geo-result';
    geoData = null;
  }
</script>
</body>
</html>
