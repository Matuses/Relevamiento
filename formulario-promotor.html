<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F2A4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Solicitud de Reparación — Suralnor / Emcala</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F7FA;--card:#FFFFFF;--border:#E2E8F0;
  --navy:#0F2A4A;--blue:#1B5FA8;--accent:#0EA5E9;
  --text:#0F2A4A;--muted:#64748B;--success:#16A34A;
  --shadow-lg:0 8px 32px rgba(15,42,74,0.13);
}
body{
  font-family:'Bricolage Grotesque',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:var(--navy);
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;
  top:-20%;left:-20%;width:50%;height:50%;
  background:radial-gradient(circle,rgba(14,165,233,0.18) 0%,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;
  bottom:-20%;right:-10%;width:40%;height:40%;
  background:radial-gradient(circle,rgba(14,165,233,0.1) 0%,transparent 70%);
  pointer-events:none;
}

/* BOX */
.form-box{
  background:white;
  border-radius:24px;
  padding:40px 36px;
  width:100%;max-width:480px;
  box-shadow:var(--shadow-lg);
  position:relative;z-index:1;
  animation:formUp 0.5s ease forwards;
}
@keyframes formUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* LOGO */
.form-logo{display:flex;justify-content:center;margin-bottom:20px;}
.form-logo img{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--border);}

/* TÍTULO */
.form-title{font-size:22px;font-weight:800;text-align:center;color:var(--navy);margin-bottom:4px;}
.form-subtitle{font-size:13px;color:var(--accent);font-weight:600;text-align:center;margin-bottom:6px;letter-spacing:0.03em;}
.form-desc{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;}

/* CAMPOS */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;text-align:center;
}
.req{color:#DC2626;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:15px;color:var(--text);
  background:var(--bg);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;appearance:none;
  text-align:center;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(14,165,233,0.12);
}
.field textarea{resize:vertical;min-height:90px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0;}

/* GEO */
.geo-btn{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--bg);color:var(--navy);
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.2s;
}
.geo-btn:hover{border-color:var(--accent);background:rgba(14,165,233,0.05);}
.geo-btn.loading .geo-icon{display:none;}
.geo-btn:not(.loading) .spinner{display:none;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.geo-result{margin-top:10px;font-size:13px;padding:0;}
.geo-result.ok{color:var(--success);font-weight:600;}
.geo-result.err{color:#DC2626;}

/* SUBMIT */
.submit-btn{
  width:100%;padding:14px;
  background:var(--navy);color:white;
  border:none;border-radius:12px;
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:16px;font-weight:700;
  cursor:pointer;margin-top:8px;
  transition:background 0.2s,transform 0.1s;
}
.submit-btn:hover{background:#1B5FA8;}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* SUCCESS */
.success-box{
  display:none;text-align:center;padding:32px 24px;
}
.success-icon{font-size:56px;margin-bottom:16px;}
.success-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px;}
.success-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
.success-ot{
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;padding:14px;
  font-family:'DM Mono',monospace;font-size:18px;
  font-weight:700;color:var(--navy);letter-spacing:0.05em;
}
.btn-nuevo{
  display:inline-block;margin-top:20px;
  padding:12px 28px;background:var(--navy);color:white;
  border:none;border-radius:10px;font-family:'Bricolage Grotesque',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background 0.2s;
}
.btn-nuevo:hover{background:var(--blue);}

/* RESPONSIVE MOBILE — Samsung A05 / Moto E22 (360-390px) */
@media(max-width:480px){
  body{
    padding:0;
    align-items:flex-start;
    background:var(--navy);
    overflow-y:auto;
  }
  .form-box{
    border-radius:16px;
    padding:28px 20px 40px;
    box-shadow:none;
    margin:20px 16px;
    animation:none;
    max-width:100%;
  }
  .form-logo img{width:68px;height:68px;}
  .form-title{font-size:17px;}
  .form-desc{font-size:12px;margin-bottom:18px;}
  .grid-2{grid-template-columns:1fr;}
  .field{margin-bottom:13px;}
  .field input,.field select,.field textarea{
    font-size:16px;
    padding:13px 12px;
  }
  .field label{font-size:10px;margin-bottom:5px;}
  .field textarea{min-height:76px;}
  .geo-btn{font-size:14px;padding:13px 12px;}
  .submit-btn{
    font-size:16px;padding:15px;
    margin-top:12px;
  }
  .divider{margin:14px 0;}
}
input,select,textarea,button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
</style>
</head>

  </div>

  <!-- TÍTULO -->
  <div class="form-title">SOLICITUD DE REPARACIÓN</div>
  <div class="form-desc">Completá todos los campos para registrar la solicitud</div>

  <!-- FORMULARIO -->
  <div id="formContent">
    <form id="mainForm" novalidate>

      <div class="grid-2">

          <label>Código de Cliente <span class="req">*</span></label>
          <input type="text" id="codigoCliente" placeholder="Ej: CLI-0042" required>
        </div>
        <div class="field">
          <label>Marca Heladera <span class="req">*</span></label>
          <input type="text" id="tipoLogo" placeholder="Quilmes, Pepsi, Brahma..." required>
        </div>
      </div>

      <div class="field">

<script>
  let geoData = null;

  function geolocate() {
    const btn = document.getElementById('geoBtn');
    const result = document.getElementById('geoResult');

    if (!navigator.geolocation) {
      result.className = 'geo-result err';
      result.innerHTML = '✕ Tu navegador no soporta geolocalización.';
      return;
    }

    btn.classList.add('loading');
    result.className = 'geo-result';

    let bestPos = null;
    let readings = 0;
    const MAX_READINGS = 4;
    const MIN_ACCURACY = 50; // metros — si llegamos a esto, paramos antes
    let watchId = null;
    let timeoutId = null;

    function updateBtn(msg) {
      const span = btn.querySelector('span');
      if (span) span.textContent = msg;
    }

    function done(pos) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (timeoutId) clearTimeout(timeoutId);

      const lat = pos.coords.latitude.toFixed(6).replace(',','.');
      const lng = pos.coords.longitude.toFixed(6).replace(',','.');
      const acc = Math.round(pos.coords.accuracy);
      geoData = { lat, lng, acc };
      document.getElementById('latitud').value = lat;
      document.getElementById('longitud').value = lng;

      btn.classList.remove('loading');

      // Color del indicador según precisión
      const accColor = acc <= 20 ? 'var(--success)' : acc <= 50 ? '#D97706' : 'var(--error)';
      const accLabel = acc <= 20 ? 'Muy preciso' : acc <= 50 ? 'Aceptable' : 'Baja precisión';

      result.className = 'geo-result ok';
      result.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        <div>
          Ubicación capturada
          <span class="geo-coords">Lat: ${lat} | Lng: ${lng}</span>
          <span style="display:block;margin-top:3px;font-size:11px;font-weight:700;color:${accColor}">
            ± ${acc}m · ${accLabel}
          </span>
        </div>`;
    }

    function fail(err) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      if (timeoutId) clearTimeout(timeoutId);

      // Si ya teníamos algo, usarlo igual
      if (bestPos) { done(bestPos); return; }

      btn.classList.remove('loading');
      result.className = 'geo-result err';
      const msgs = {
        1: 'Permiso denegado. Habilitá la ubicación en Configuración.',
        2: 'No se pudo obtener ubicación. Verificá que el GPS esté activo.',
        3: 'Tiempo agotado. Intentá en un lugar más abierto.'
      };
      result.innerHTML = `✕ ${msgs[err.code] || 'Error desconocido. Intentá de nuevo.'}`;
    }

    // Usamos watchPosition para tomar varias lecturas y quedarnos con la mejor
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        readings++;
        updateBtn(`Mejorando precisión... (${readings}/${MAX_READINGS})`);

        if (!bestPos || pos.coords.accuracy < bestPos.coords.accuracy) {
          bestPos = pos;
        }

        // Parar si llegamos a buena precisión o al máximo de lecturas
        if (pos.coords.accuracy <= MIN_ACCURACY || readings >= MAX_READINGS) {
          done(bestPos);
        }
      },
      fail,
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );

    // Timeout total de 20 segundos
    timeoutId = setTimeout(() => {
      if (bestPos) { done(bestPos); }
      else { fail({ code: 3 }); }
    }, 20000);
  }

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuKwoNm1lg_m8To20FKNuzxNcMmHDZV4nTCz6to4ACk28ZmmuucnHSv2iMfBwpuLGQ/exec';

  document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fields = [
      { id: 'promotor', label: 'Promotor' },
      { id: 'codigoCliente', label: 'Código de Cliente' },
      { id: 'tipoLogo', label: 'Tipo de Logo' },
      { id: 'edf', label: 'EDF' },
      { id: 'fallaSugerida', label: 'Falla Sugerida' },
    ];

    let valid = true;
    fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el.value.trim()) {
        el.style.borderColor = 'var(--error)';
        el.style.boxShadow = '0 0 0 3px rgba(255,77,109,0.15)';
        valid = false;
        el.addEventListener('input', () => {
          el.style.borderColor = '';
          el.style.boxShadow = '';
        }, { once: true });
      }
    });

    if (!valid) {
      const firstErr = document.querySelector('[style*="error"]');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const payload = {
      timestamp: new Date().toISOString(),
      promotor: document.getElementById('promotor').value,
      rol: 'promotor',
      cliente: document.getElementById('codigoCliente').value,
      marca: document.getElementById('tipoLogo').value,
      edf: document.getElementById('edf').value,
      falla: document.getElementById('fallaSugerida').value,
      lat: geoData ? geoData.lat : '',
      lng: geoData ? geoData.lng : '',
      foto: '',
      notas: ''
    };

    // Enviar en segundo plano sin esperar respuesta
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });

    // Mostrar éxito inmediatamente
    const summary = `
PROMOTOR: ${payload.promotor}
CÓDIGO CLIENTE: ${payload.cliente}
MARCA HELADERA: ${payload.marca}
EDF: ${payload.edf}
FALLA SUGERIDA: ${payload.falla}
UBICACIÓN: ${geoData ? `Lat ${geoData.lat}, Lng ${geoData.lng}` : 'No capturada'}
    `.trim();

    document.getElementById('summaryText').textContent = summary;
    document.getElementById('successOverlay').classList.add('show');
  });

  function resetForm() {
    document.getElementById('mainForm').reset();
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('geoResult').className = 'geo-result';
    geoData = null;
    // Reiniciar GPS al limpiar
    setTimeout(() => geolocate(), 500);
  }

  // Iniciar GPS automáticamente al cargar
  window.addEventListener('load', () => setTimeout(() => geolocate(), 600));
</script>
</body>
</html>
