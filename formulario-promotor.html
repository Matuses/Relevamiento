<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Relevamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e8edf5;
    --muted: #6b7a99;
    --success: #00e5a0;
    --error: #ff4d6d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(255,107,53,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
    animation: slideUp 0.6s ease forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    margin-bottom: 32px;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .header-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
    font-weight: 300;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
  }

  /* Fields */
  .field {
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }
  .field:nth-child(1) { animation-delay: 0.05s; }
  .field:nth-child(2) { animation-delay: 0.10s; }
  .field:nth-child(3) { animation-delay: 0.15s; }
  .field:nth-child(4) { animation-delay: 0.20s; }
  .field:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  label .req { color: var(--accent2); margin-left: 2px; }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    background: #1e2d44;
  }
  input::placeholder { color: var(--muted); }
  select { cursor: pointer; }
  select option { background: var(--surface2); }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  /* Grid for 2 cols */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Geo Button */
  .geo-section {
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease 0.3s forwards;
    opacity: 0;
  }
  .geo-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0,212,255,0.08);
    border: 1px dashed rgba(0,212,255,0.35);
    border-radius: 12px;
    padding: 15px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .geo-btn:hover {
    background: rgba(0,212,255,0.14);
    border-style: solid;
    transform: translateY(-1px);
  }
  .geo-btn:active { transform: translateY(0); }
  .geo-btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }
  .geo-btn svg { flex-shrink: 0; }

  .geo-result {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .geo-result.ok {
    display: flex;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--success);
  }
  .geo-result.err {
    display: flex;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.2);
    color: var(--error);
  }
  .geo-coords {
    font-size: 11px;
    opacity: 0.8;
    font-family: monospace;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease 0.35s forwards;
    opacity: 0;
  }
  .submit-btn:hover {
    background: #33dcff;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.25);
  }
  .submit-btn:active { transform: translateY(0); }

  /* Success overlay */
  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
  .success-icon {
    width: 80px; height: 80px;
    background: rgba(0,229,160,0.1);
    border: 2px solid var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }
  .success-overlay h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--success);
  }
  .success-overlay p { color: var(--muted); font-size: 14px; }
  .reset-btn {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 24px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,212,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .loading .spinner { display: block; }
  .loading .geo-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .grid-2 { grid-template-columns: 1fr; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-badge">Relevamiento de Campo</div>
    <h1>Formulario de <span>Registro</span></h1>
    <p class="subtitle">Completá todos los campos antes de enviar</p>
  </div>

  <div class="card">
    <form id="mainForm" novalidate>

      <!-- PROMOTOR -->
      <div class="field">
        <label>Promotor <span class="req">*</span></label>
        <select id="promotor" required>
          <option value="" disabled selected>Seleccionar promotor...</option>
            <option>ANDUAGA SANTIAGO</option>
            <option>ASCONA MATIAS</option>
            <option>AVILA EZEQUIEL</option>
            <option>BENITEZ NAHUEL</option>
            <option>CESPEDES ENZO</option>
            <option>DIAZ VALERIA</option>
            <option>DOMINGUEZ GONZALO</option>
            <option>FERNANDEZ LUIS</option>
            <option>FERREYRA LEONARDO</option>
            <option>FERREYRA TOBIAS</option>
            <option>FREDES CLAUDIA</option>
            <option>GALLO JONATHAN</option>
            <option>GEREZ JONATHAN</option>
            <option>GOMEZ GUSTAVO</option>
            <option>GONZALEZ ROBERTO</option>
            <option>JAIMES EZEQUIEL</option>
            <option>JOFRE LUCAS</option>
            <option>LEITES RODRIGO</option>
            <option>LOPEZ ALEJANDRA</option>
            <option>LOPEZ PABLO</option>
            <option>MENDOZA SERGIO</option>
            <option>MIÑO RENZO</option>
            <option>MORENO AGUSTINA</option>
            <option>MOURELLE ALFREDO</option>
            <option>MUÑOZ PAULA</option>
            <option>PEREYRA BRAIAN</option>
            <option>PERREN ANDREA</option>
            <option>REGNER LEANDRO</option>
            <option>SAN JUAN CARLOS</option>
            <option>SANCHEZ ROCIO</option>
            <option>SANTILLAN SERGIO</option>
            <option>SCORNAVACHE WALTER</option>
            <option>SILVA VICTOR</option>
            <option>TESEI ALEJANDRA</option>
            <option>TORRES KARINA</option>
            <option>VEDIA ELIZABETH</option>
        </select>
      </div>

      <!-- CODIGO CLIENTE + TIPO LOGO -->
      <div class="grid-2">
        <div class="field">
          <label>Código de Cliente <span class="req">*</span></label>
          <input type="text" id="codigoCliente" placeholder="Ej: CLI-0042" required>
        </div>
        <div class="field">
          <label>MARCA QUE LLEVA LA HELADERA <span class="req">*</span></label>
          <input type="text" id="tipoLogo" placeholder="Ej: Quilmes, Brahma, Stella..." required>
        </div>
      </div>

      <!-- EDF -->
      <div class="field">
        <label>EDF <span class="req">*</span></label>
        <input type="text" id="edf" placeholder="Ingresá el EDF" required>
      </div>

      <!-- FALLA SUGERIDA -->
      <div class="field">
        <label>Falla Sugerida <span class="req">*</span></label>
        <textarea id="fallaSugerida" placeholder="Describí la falla sugerida..." required></textarea>
      </div>

      <div class="divider"></div>

      <!-- GEOLOCALIZACIÓN -->
      <div class="geo-section">
        <label>Ubicación GPS</label>
        <button type="button" class="geo-btn" id="geoBtn" onclick="geolocate()">
          <div class="spinner"></div>
          <svg class="geo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            <circle cx="12" cy="12" r="8" opacity="0.3"/>
          </svg>
          Obtener Ubicación Actual
        </button>
        <div class="geo-result" id="geoResult"></div>
        <input type="hidden" id="latitud" name="latitud">
        <input type="hidden" id="longitud" name="longitud">
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="submit-btn">Enviar Registro →</button>

    </form>
  </div>
</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✓</div>
  <h2>¡Registro Enviado!</h2>
  <p>El formulario fue completado y enviado correctamente.</p>
  <div id="summaryText" style="color: var(--muted); font-size: 12px; margin-top: 4px; font-family: monospace; background: var(--surface2); padding: 12px 16px; border-radius: 8px; text-align: left; line-height: 1.8;"></div>
  <button class="reset-btn" onclick="resetForm()">Nuevo Registro</button>
</div>

<script>
  let geoData = null;

  function geolocate() {
    const btn = document.getElementById('geoBtn');
    const result = document.getElementById('geoResult');

    if (!navigator.geolocation) {
      result.className = 'geo-result err';
      result.innerHTML = '✕ Tu navegador no soporta geolocalización.';
      return;
    }

    btn.classList.add('loading');
    btn.querySelector('.geo-btn span') && (btn.querySelector('.geo-btn span').textContent = 'Obteniendo...');
    result.className = 'geo-result';

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        geoData = { lat, lng };
        document.getElementById('latitud').value = lat;
        document.getElementById('longitud').value = lng;

        btn.classList.remove('loading');
        result.className = 'geo-result ok';
        result.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <div>Ubicación capturada <span class="geo-coords">Lat: ${lat} | Lng: ${lng}</span></div>`;
      },
      (err) => {
        btn.classList.remove('loading');
        result.className = 'geo-result err';
        const msgs = {
          1: 'Permiso denegado. Habilitá la ubicación en tu navegador.',
          2: 'No se pudo determinar la ubicación.',
          3: 'Tiempo de espera agotado. Intentá de nuevo.'
        };
        result.innerHTML = `✕ ${msgs[err.code] || 'Error desconocido.'}`;
      },
      { timeout: 10000, enableHighAccuracy: true }
    );
  }

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuKwoNm1lg_m8To20FKNuzxNcMmHDZV4nTCz6to4ACk28ZmmuucnHSv2iMfBwpuLGQ/exec';

  document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const fields = [
      { id: 'promotor', label: 'Promotor' },
      { id: 'codigoCliente', label: 'Código de Cliente' },
      { id: 'tipoLogo', label: 'Tipo de Logo' },
      { id: 'edf', label: 'EDF' },
      { id: 'fallaSugerida', label: 'Falla Sugerida' },
    ];

    let valid = true;
    fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el.value.trim()) {
        el.style.borderColor = 'var(--error)';
        el.style.boxShadow = '0 0 0 3px rgba(255,77,109,0.15)';
        valid = false;
        el.addEventListener('input', () => {
          el.style.borderColor = '';
          el.style.boxShadow = '';
        }, { once: true });
      }
    });

    if (!valid) {
      const firstErr = document.querySelector('[style*="error"]');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    // Mostrar estado de carga
    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.textContent = 'Enviando...';
    submitBtn.disabled = true;

    const payload = {
      timestamp: new Date().toISOString(),
      promotor: document.getElementById('promotor').value,
      rol: 'promotor',
      cliente: document.getElementById('codigoCliente').value,
      marca: document.getElementById('tipoLogo').value,
      edf: document.getElementById('edf').value,
      falla: document.getElementById('fallaSugerida').value,
      lat: geoData ? geoData.lat : '',
      lng: geoData ? geoData.lng : '',
      foto: '',
      notas: ''
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const summary = `
PROMOTOR: ${payload.promotor}
CÓDIGO CLIENTE: ${payload.cliente}
MARCA HELADERA: ${payload.marca}
EDF: ${payload.edf}
FALLA SUGERIDA: ${payload.falla}
UBICACIÓN: ${geoData ? `Lat ${geoData.lat}, Lng ${geoData.lng}` : 'No capturada'}
      `.trim();

      document.getElementById('summaryText').textContent = summary;
      document.getElementById('successOverlay').classList.add('show');
    } catch (err) {
      submitBtn.textContent = 'Error al enviar. Intentá de nuevo.';
      submitBtn.disabled = false;
    }
  });

  function resetForm() {
    document.getElementById('mainForm').reset();
    document.getElementById('successOverlay').classList.remove('show');
    document.getElementById('geoResult').className = 'geo-result';
    geoData = null;
  }
</script>
</body>
</html>
