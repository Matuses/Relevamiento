<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard – Suralnor / Emcala</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#F5F7FA; --card:#FFFFFF; --border:#E2E8F0;
  --navy:#0F2A4A; --blue:#1B5FA8; --accent:#0EA5E9;
  --text:#0F2A4A; --muted:#64748B; --success:#16A34A;
  --warn:#D97706; --danger:#DC2626;
  --radius:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:24px;}
.login-box{background:white;border-radius:24px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;}
.login-logo-text{font-size:18px;font-weight:700;color:var(--navy);}
.lf{margin-bottom:16px;}
.lf label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:8px;text-align:center;}
.lf input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--bg);outline:none;}
.btn-primary{width:100%;background:var(--navy);color:white;border:none;border-radius:10px;padding:14px;font-weight:600;cursor:pointer;}

/* DASHBOARD */
#dashboard{display:none;}
.topbar{background:var(--navy);color:white;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.role-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:rgba(14,165,233,0.2);color:#7DD3FC;text-transform:uppercase;}
.btn-logout{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:white;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;}

.main{padding:24px 28px;display:grid;grid-template-columns:1fr 360px;gap:20px;max-width:1400px;margin:0 auto;}

/* KPI CARDS */
.stats-grid{grid-column:1/-1;display:grid;grid-template-columns:repeat(3, 1fr);gap:16px;}
.stat-card{background:white;border-radius:var(--radius);padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid var(--navy);}
.stat-card label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.stat-card p{font-size:24px;font-weight:800;margin:4px 0;}

.filters-bar{grid-column:1/-1;background:white;border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filters-bar select{padding:8px; border-radius:8px; border:1px solid var(--border); font-size:13px;}

.card{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
#map{height:420px;}
.table-scroll{overflow-y:auto;max-height:500px;}
.reg-item{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);cursor:pointer;}
.reg-item:hover{background:#F8FAFC;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:11px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:20px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px;}
.mf{background:#F8FAFC;padding:12px;border-radius:10px;margin-bottom:10px;}
.mf label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;display:block;}
.btn-maps{display:block;text-align:center;background:var(--navy);color:white;padding:12px;border-radius:10px;text-decoration:none;font-weight:600;margin-top:10px;}

@media(max-width:900px){ .main{grid-template-columns:1fr;} .stats-grid{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>

      <div class="login-logo-text">Suralnor <span>·</span> Emcala</div>
    </div>
    <div class="lf"><label>Usuario</label><input type="text" id="loginUser"></div>
    <div class="lf"><label>Contraseña</label><input type="password" id="loginPass"></div>
    <button class="btn-primary" onclick="doLogin()">Ingresar →</button>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="topbar-title">Suralnor <span>·</span> Emcala</div>
    <div class="topbar-right">
      <span class="role-badge" id="roleBadge"></span>
      <strong id="userLabel" style="margin-right:15px"></strong>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-grid">
      <div class="stat-card" style="border-left-color: var(--danger);"><label>⚠️ Casos Críticos</label><p id="kpiCriticos">0</p></div>
      <div class="stat-card" style="border-left-color: var(--warn);"><label>⏳ Pendientes</label><p id="kpiPendientes">0</p></div>
      <div class="stat-card" style="border-left-color: var(--success);"><label>📊 Eficacia</label><p id="kpiEficacia">0%</p></div>
    </div>

    <div class="filters-bar">
      <label>Filtros:</label>
      <select id="fNombre" onchange="applyFilters()"><option value="">Promotor: Todos</option></select>
      <select id="fEstado" onchange="applyFilters()">
        <option value="">Estado: Todos</option>
        <option value="resuelto">✅ Resuelto</option>
        <option value="pendiente">⏳ Pendiente</option>
        <option value="sin-estado">⬜ Sin estado</option>
      </select>
      <select id="fPrioridad" onchange="applyFilters()">
        <option value="">Prioridad: Todas</option>
        <option value="1">⚠️ P1 (Urgente)</option>
        <option value="2">⚠️ P2 (Alta)</option>
        <option value="3">P3 (Media)</option>
      </select>
      <button onclick="loadData()" style="background:var(--navy); color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">↻ Actualizar</button>
    </div>

    <div class="card"><div id="map"></div></div>

    <div class="card">
      <div class="card-header"><h3>📋 Lista por Prioridad</h3><span id="listCount" class="badge-count">0</span></div>
      <div class="table-scroll" id="registrosList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModalDirect()">
  <div class="modal">
    <h2 id="modalNombre" style="margin-bottom:15px; color:var(--navy)"></h2>
    <div id="modalBody"></div>
    <button onclick="closeModalDirect()" style="width:100%; padding:12px; margin-top:20px; cursor:pointer; background:var(--bg); border:1px solid var(--border); border-radius:10px; font-weight:700">Cerrar Ventana</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuKwoNm1lg_m8To20FKNuzxNcMmHDZV4nTCz6to4ACk28ZmmuucnHSv2iMfBwpuLGQ/exec';

let allData=[], seguimientos={}, filtered=[], leafMap=null, markers=[];
let currentUser='', currentRole='';

function jsonp(url) {
  return new Promise(resolve => {
    const cb = 'cb_' + Date.now();
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    window[cb] = d => { delete window[cb]; document.body.removeChild(s); resolve(d); };
    document.body.appendChild(s);
  });
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toUpperCase();
  const p = document.getElementById('loginPass').value;
  const d = await jsonp(`${SCRIPT_URL}?action=login&usuario=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
  if(d.ok) {
    currentUser=u; currentRole=d.rol;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('userLabel').textContent = d.label;
    document.getElementById('roleBadge').textContent = d.rol;
    document.getElementById('roleBadge').className = 'role-badge ' + d.rol;
    initMap(); loadData();
  } else { alert("Usuario o clave incorrectos"); }
}

function initMap() { 
  if (leafMap) return;
  leafMap = L.map('map').setView([-34.62,-58.38],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafMap);
}

async function loadData() {
  const d = await jsonp(`${SCRIPT_URL}?action=datos&usuario=${encodeURIComponent(currentUser)}&password=NA`);
  if(d.ok) {
    // 0:OT, 1:TS, 2:Promotor, 4:Cliente, 5:Marca, 7:Falla, 8:Lat, 9:Lng, 11:Notas
    allData = d.registros.slice(1).map(c => ({ 
      ot:c[0], ts:c[1], nombre:c[2], cliente:c[4], marca:c[5], falla:c[7], lat:c[8], lng:c[9], notas:c[11] 
    }));
    
    // Mapear seguimientos (4:estado, 8:prioridad_aprobada)
    seguimientos = {};
    d.seguimientos.slice(1).forEach(c => {
      const k = c[1] || c[2]; // OT o Cliente
      seguimientos[k] = { estado:c[4], priA:c[8], com:c[5] };
    });

    const names = [...new Set(allData.map(r=>r.nombre))].sort();
    document.getElementById('fNombre').innerHTML = '<option value="">Promotor: Todos</option>' + names.map(n=>`<option value="${n}">${n}</option>`).join('');
    applyFilters();
  }
}

function applyFilters() {
  const n = document.getElementById('fNombre').value;
  const e = document.getElementById('fEstado').value;
  const p = document.getElementById('fPrioridad').value;

  filtered = allData.filter(r => {
    const s = seguimientos[r.ot] || seguimientos[r.cliente] || {};
    const eKey = (s.estado||'').toLowerCase().replace(/ /g,'-');
    if(n && r.nombre !== n) return false;
    if(e && eKey !== e && !(e==='sin-estado' && eKey==='')) return false;
    if(p && (s.priA||'') !== p) return false;
    if(currentRole === 'tecnico' && !s.priA) return false;
    return true;
  });

  updateKPIs(filtered);
  renderList(filtered);
  updateMarkers(filtered);
}

function updateKPIs(data) {
  const ahora = Date.now();
  const crit = data.filter(r => (ahora - new Date(r.ts))/86400000 > 20).length;
  const res = data.filter(r => {
    const s = seguimientos[r.ot] || seguimientos[r.cliente];
    return s && (s.estado||'').toLowerCase() === 'resuelto';
  }).length;
  document.getElementById('kpiCriticos').textContent = crit;
  document.getElementById('kpiPendientes').textContent = data.length - res;
  document.getElementById('kpiEficacia').textContent = data.length ? Math.round((res/data.length)*100)+'%' : '0%';
}

function renderList(data) {
  const ordenada = [...data].sort((a,b) => {
    const pA = (seguimientos[a.ot]||seguimientos[a.cliente]||{}).priA || "99";
    const pB = (seguimientos[b.ot]||seguimientos[b.cliente]||{}).priA || "99";
    return parseInt(pA) - parseInt(pB);
  });

  document.getElementById('registrosList').innerHTML = ordenada.map(r => {
    const s = seguimientos[r.ot] || seguimientos[r.cliente] || {};
    const color = (Date.now() - new Date(r.ts))/86400000 > 20 ? 'var(--danger)' : 'var(--success)';
    // Escapar comillas para el onclick
    const rString = JSON.stringify(r).replace(/'/g, "&#39;");
    return `
      <div class="reg-item" onclick='openModal(${rString})'>
        <div class="avatar" style="background:${color}">${(r.cliente||'?').slice(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <strong>OT ${r.ot} ${s.priA ? '<span style="color:var(--accent)">[P'+s.priA+']</span>' : ''}</strong><br>
          <small>${r.cliente} · 👤 ${r.nombre}</small>
        </div>
      </div>`;
  }).join('');
  document.getElementById('listCount').textContent = data.length;
}

function updateMarkers(data) {
  markers.forEach(m => leafMap.removeLayer(m)); markers = [];
  data.forEach(r => {
    const lat = parseFloat(String(r.lat).replace(',','.')), lng = parseFloat(String(r.lng).replace(',','.'));
    if(!isNaN(lat) && lat !== 0) {
      const color = (Date.now() - new Date(r.ts))/86400000 > 20 ? 'red' : 'green';
      const mk = L.circleMarker([lat, lng], {radius:6, fillColor:color, color:'white', weight:2, fillOpacity:1}).addTo(leafMap);
      markers.push(mk);
    }
  });
}

function openModal(r) {
  const s = seguimientos[r.ot] || seguimientos[r.cliente] || {};
  document.getElementById('modalNombre').textContent = 'OT ' + r.ot;
  let adminHTML = '';
  if(currentRole === 'tecnico') {
    adminHTML = `
      <div class="seguimiento-section">
        <label>Actualizar Estado</label>
        <select id="segEstado" style="width:100%; padding:10px; margin:10px 0; border-radius:8px">
          <option value="resuelto">✅ Resuelto</option>
          <option value="pendiente">⏳ Pendiente</option>
        </select>
        <textarea id="segComentario" style="width:100%; height:80px; padding:10px; border-radius:8px" placeholder="Comentarios técnicos...">${s.com||''}</textarea>
        <button class="btn-primary" style="margin-top:10px" onclick="guardar('${r.cliente}','${r.nombre}','${r.ot}')">Guardar Gestión</button>
      </div>`;
  }

  document.getElementById('modalBody').innerHTML = `
    <div class="mf"><label>Punto de Venta</label><p>${r.cliente}</p></div>
    <div class="mf"><label>Falla Reportada</label><p>${r.falla || 'No especificada'}</p></div>
    ${r.notas ? `<div class="mf"><label>Notas</label><p>${r.notas}</p></div>` : ''}
    <a class="btn-maps" href="https://www.google.com/maps?q=${r.lat},${r.lng}" target="_blank">📍 Ver en Google Maps</a>
    ${adminHTML}
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

async function guardar(cli, pro, ot) {
  const payload = {
    tipo: 'seguimiento', timestamp: new Date().toISOString(), ot: ot, cliente: cli, promotor: pro,
    estado: document.getElementById('segEstado').value,
    comentario: document.getElementById('segComentario').value,
    tecnico: currentUser
  };
  await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(payload)});
  alert("Gestión guardada. La lista se actualizará.");
  location.reload();
}

function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('show'); }
function doLogout() { location.reload(); }
</script>
</body>
</html>
