<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard – Suralnor / Emcala</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root { --navy:#0F2A4A; --accent:#0EA5E9; --danger:#DC2626; --warn:#D97706; --success:#16A34A; --bg:#F5F7FA; --border:#E2E8F0; }
body{font-family:'Bricolage Grotesque',sans-serif; background:var(--bg); margin:0;}
#loginScreen{height:100vh; display:flex; align-items:center; justify-content:center; background:var(--navy);}
.login-box{background:white; padding:40px; border-radius:24px; width:100%; max-width:350px; text-align:center;}
.main{padding:20px; max-width:1200px; margin:0 auto; display:grid; grid-template-columns: 1fr 350px; gap:20px;}
.stats-grid{grid-column:1/-1; display:grid; grid-template-columns:repeat(3, 1fr); gap:15px; margin-bottom:10px;}
.stat-card{background:white; padding:15px; border-radius:12px; border-left:4px solid var(--navy); box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.filters-bar{grid-column:1/-1; background:white; padding:15px; border-radius:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
.card{background:white; border-radius:12px; overflow:hidden; border:1px solid var(--border);}
#map{height:400px;}
.table-scroll{height:500px; overflow-y:auto;}
.reg-item{padding:12px 15px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; align-items:center; gap:10px;}
.reg-item:hover{background:#F8FAFC;}
.avatar{width:32px; height:32px; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800;}
.modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000;}
.modal-overlay.show{display:flex;}
.modal{background:white; padding:25px; border-radius:20px; width:90%; max-width:500px;}
.btn-maps{display:block; text-align:center; background:var(--navy); color:white; padding:12px; border-radius:10px; text-decoration:none; margin-top:10px; font-weight:600;}
@media(max-width:900px){ .main{grid-template-columns:1fr;} .stats-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2 style="color:var(--navy)">Suralnor</h2>
    <input type="text" id="loginUser" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd">
    <input type="password" id="loginPass" placeholder="Clave" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd">
    <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--navy); color:white; border:none; border-radius:8px; cursor:pointer">Entrar</button>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div style="background:var(--navy); color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center">
    <strong>Suralnor · Emcala</strong>
    <span id="userLabel"></span>
  </div>

  <div class="main">
    <div class="stats-grid">
      <div class="stat-card" style="border-color:var(--danger)"><label style="font-size:11px; color:var(--muted)">⚠️ CRÍTICOS</label><p id="kpiCriticos" style="margin:5px 0; font-size:22px">0</p></div>
      <div class="stat-card" style="border-color:var(--warn)"><label style="font-size:11px; color:var(--muted)">⏳ PENDIENTES</label><p id="kpiPendientes" style="margin:5px 0; font-size:22px">0</p></div>
      <div class="stat-card" style="border-color:var(--success)"><label style="font-size:11px; color:var(--muted)">📊 EFICACIA</label><p id="kpiEficacia" style="margin:5px 0; font-size:22px">0%</p></div>
    </div>

    <div class="filters-bar">
      <select id="fNombre" onchange="applyFilters()"><option value="">Promotor: Todos</option></select>
      <select id="fEstado" onchange="applyFilters()"><option value="">Estado: Todos</option><option value="resuelto">Resuelto</option><option value="pendiente">Pendiente</option></select>
      <select id="fPrioridad" onchange="applyFilters()"><option value="">Prioridad: Todas</option><option value="1">P1</option><option value="2">P2</option><option value="3">P3</option></select>
      <button onclick="loadData()" style="cursor:pointer">↻</button>
    </div>

    <div class="card"><div id="map"></div></div>

    <div class="card">
      <div style="padding:15px; border-bottom:1px solid var(--border)"><strong>📋 Lista de Prioridades</strong></div>
      <div class="table-scroll" id="registrosList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <div id="mBody"></div>
    <button onclick="closeModal()" style="width:100%; padding:10px; margin-top:15px; cursor:pointer">Cerrar</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuKwoNm1lg_m8To20FKNuzxNcMmHDZV4nTCz6to4ACk28ZmmuucnHSv2iMfBwpuLGQ/exec';
let allData=[], seguimientos={}, filtered=[], leafMap=null, markers=[];
let currentUser='', currentRole='';

function jsonp(url) {
  return new Promise(resolve => {
    const cb = 'cb_'+Date.now();
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    window[cb] = d => { delete window[cb]; document.body.removeChild(s); resolve(d); };
    document.body.appendChild(s);
  });
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toUpperCase();
  const p = document.getElementById('loginPass').value;
  const d = await jsonp(`${SCRIPT_URL}?action=login&usuario=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
  if(d.ok){
    currentUser=u; currentRole=d.rol;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('userLabel').textContent = d.label + " (" + d.rol.toUpperCase() + ")";
    initMap(); loadData();
  } else alert("Error de acceso");
}

function initMap() { 
  leafMap = L.map('map').setView([-34.62,-58.38],10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(leafMap);
}

async function loadData() {
  const d = await jsonp(`${SCRIPT_URL}?action=datos&usuario=${encodeURIComponent(currentUser)}&password=${encodeURIComponent('NA')}`);
  if(d.ok){
    allData = d.registros.slice(1).map(c => ({ ot:c[0], ts:c[1], nombre:c[2], cliente:c[4], marca:c[5], falla:c[7], lat:c[8], lng:c[9] }));
    const hS = d.seguimientos[0].map(s=>(s||'').toLowerCase());
    d.seguimientos.slice(1).forEach(c => {
      const k = c[hS.indexOf('ot')] || c[hS.indexOf('cliente')];
      seguimientos[k] = { estado:c[hS.indexOf('estado')], priA:c[hS.indexOf('prioridad_aprobada')], com:c[hS.indexOf('comentario')] };
    });
    populateFilters(); applyFilters();
  }
}

function applyFilters() {
  const n = document.getElementById('fNombre').value;
  const e = document.getElementById('fEstado').value;
  const p = document.getElementById('fPrioridad').value;

  filtered = allData.filter(r => {
    const s = seguimientos[r.ot] || seguimientos[r.cliente] || {};
    if(n && r.nombre !== n) return false;
    if(e && (s.estado||'').toLowerCase() !== e) return false;
    if(p && (s.priA||'') !== p) return false;
    return true;
  });

  updateKPIs(filtered);
  renderList(filtered);
  updateMap(filtered);
}

function updateKPIs(data) {
  const crit = data.filter(r => (Date.now() - new Date(r.ts))/86400000 > 20).length;
  const res = data.filter(r => { const s=seguimientos[r.ot]||seguimientos[r.cliente]; return s && s.estado==='resuelto'; }).length;
  document.getElementById('kpiCriticos').textContent = crit;
  document.getElementById('kpiPendientes').textContent = data.length - res;
  document.getElementById('kpiEficacia').textContent = data.length ? Math.round((res/data.length)*100)+'%' : '0%';
}

function renderList(data) {
  // ORDEN POR PRIORIDAD (P1 -> P2 -> P3 -> Resto)
  const ordenada = [...data].sort((a,b) => {
    const pA = (seguimientos[a.ot]||seguimientos[a.cliente]||{}).priA || "99";
    const pB = (seguimientos[b.ot]||seguimientos[b.cliente]||{}).priA || "99";
    return parseInt(pA) - parseInt(pB);
  });

  document.getElementById('registrosList').innerHTML = ordenada.map(r => {
    const s = seguimientos[r.ot] || seguimientos[r.cliente] || {};
    const color = (Date.now() - new Date(r.ts))/86400000 > 20 ? 'var(--danger)' : 'var(--success)';
    return `
      <div class="reg-item" onclick='openModal(${JSON.stringify(r)})'>
        <div class="avatar" style="background:${color}">${(r.cliente||'?').slice(0,2)}</div>
        <div style="flex:1">
          <strong>OT ${r.ot} ${s.priA ? '[P'+s.priA+']' : ''}</strong><br>
          <small>${r.cliente} · 👤 ${r.nombre}</small>
        </div>
      </div>`;
  }).join('');
}

function updateMap(data) {
  markers.forEach(m => leafMap.removeLayer(m)); markers = [];
  data.forEach(r => {
    const lat = parseFloat(String(r.lat).replace(',','.')), lng = parseFloat(String(r.lng).replace(',','.'));
    if(!isNaN(lat) && lat !== 0) {
      const color = (Date.now() - new Date(r.ts))/86400000 > 20 ? 'red' : 'green';
      const m = L.circleMarker([lat, lng], {radius:6, color:'white', weight:2, fillColor:color, fillOpacity:1}).addTo(leafMap);
      markers.push(m);
    }
  });
}

function openModal(r) {
  document.getElementById('mTitle').textContent = 'Detalle OT ' + r.ot;
  document.getElementById('mBody').innerHTML = `
    <p><strong>Cliente:</strong> ${r.cliente}</p>
    <p><strong>Falla:</strong> ${r.falla}</p>
    <a class="btn-maps" href="https://www.google.com/maps?q=${r.lat},${r.lng}" target="_blank">📍 Ver en Maps</a>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function populateFilters() {
  const names = [...new Set(allData.map(r=>r.nombre))].sort();
  document.getElementById('fNombre').innerHTML = '<option value="">Promotor: Todos</option>' + names.map(n=>`<option value="${n}">${n}</option>`).join('');
}
</script>
</body>
</html>
