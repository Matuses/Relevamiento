<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suralnor / Emcala – Sistema de Relevamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1f2d45;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e8edf5;
    --muted: #6b7a99;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; right: -10%;
    width: 50%; height: 50%;
    background: radial-gradient(ellipse, rgba(255,107,53,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    text-align: center;
    animation: up 0.6s ease forwards;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
    padding: 4px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 40px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    margin-bottom: 48px;
    line-height: 1.6;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 20px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.promotor::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .card.supervisor::before { background: linear-gradient(90deg, transparent, var(--accent2), transparent); }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .card.promotor:hover { border-color: rgba(0,212,255,0.4); }
  .card.supervisor:hover { border-color: rgba(255,107,53,0.4); }
  .card:hover::before { opacity: 1; }

  .icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .card.promotor .icon { background: rgba(0,212,255,0.1); }
  .card.supervisor .icon { background: rgba(255,107,53,0.1); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
  }
  .card.promotor .card-title { color: var(--accent); }
  .card.supervisor .card-title { color: var(--accent2); }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .arrow {
    margin-top: 4px;
    font-size: 18px;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
  }
  .card:hover .arrow { opacity: 1; transform: translateX(4px); }

  @media (max-width: 420px) {
    h1 { font-size: 30px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Sistema de Relevamiento</div>
  <h1>Suralnor<br><span>Emcala</span></h1>
  <p class="subtitle">Seleccioná tu rol para continuar</p>

  <div class="cards">
    <a href="formulario-promotor.html" class="card promotor">
      <div class="icon">📋</div>
      <div class="card-title">Promotor</div>
      <div class="card-desc">Completar formulario de relevamiento de campo</div>
      <div class="arrow">→</div>
    </a>
    <a href="dashboard.html" class="card supervisor">
      <div class="icon">📊</div>
      <div class="card-title">Supervisor</div>
      <div class="card-desc">Ver dashboard, métricas y registros del equipo</div>
      <div class="arrow">→</div>
    </a>
  </div>
</div>
</body>
</html>
