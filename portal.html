<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRADE MARKETING · Portal Central</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Bricolage Grotesque',sans-serif;background:linear-gradient(145deg,#0B2559 0%,#1B5FA8 60%,#0D3880 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:400px;text-align:center;animation:fadeIn 0.6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px;color:#fff}
.subtitle{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:40px;font-weight:500}
.login-card{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);backdrop-filter:blur(10px);padding:36px 28px;border-radius:24px;margin-bottom:20px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;color:rgba(255,255,255,0.55)}
.field input{width:100%;padding:14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;font-family:inherit;font-size:15px;outline:none;transition:all 0.2s;text-align:center;color:#fff}
.field input::placeholder{color:rgba(255,255,255,0.35)}
.field input:focus{border-color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.18)}
.btn-login{width:100%;background:#fff;color:#0B2559;border:none;padding:16px;border-radius:12px;font-weight:800;font-size:15px;cursor:pointer;transition:opacity 0.2s;font-family:inherit}
.btn-login:hover{opacity:0.9}
.error{color:#FFD580;font-size:13px;margin-top:12px;display:none;font-weight:600}
#menuPrincipal{display:none}
.user-info{margin-bottom:24px;padding:15px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:16px}
.user-info strong{display:block;font-size:18px;color:#fff}
.user-info span{font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.05em}
.link-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,0.1);color:#fff;text-decoration:none;padding:20px;border-radius:16px;margin-bottom:12px;font-weight:700;font-size:16px;border:1px solid rgba(255,255,255,0.18);transition:transform 0.2s,background 0.2s}
.link-btn:hover{transform:scale(1.02);background:rgba(255,255,255,0.18)}
.btn-logout-small{background:none;border:none;color:rgba(255,255,255,0.45);font-size:12px;font-weight:600;margin-top:20px;cursor:pointer;text-decoration:underline;font-family:inherit}
</style>
</head>
<body>

<div class="container">
  <h1>TRADE MARKETING</h1>
  <p class="subtitle">Gestión Integral de Operaciones</p>

  <div id="sectionLogin" class="login-card">
    <div class="field"><label>Usuario</label><input type="text" id="user" placeholder="USUARIO"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="pass" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLoginHub()">Ingresar</button>
    <div id="loginErr" class="error">Credenciales incorrectas</div>
  </div>

  <div id="menuPrincipal">
    <div class="user-info">
      <span id="labelRol"></span>
      <strong id="labelNombre"></strong>
    </div>
    <a href="edf-repago.html" class="link-btn">📊 REPAGO (EDF)</a>
    <a href="index.html" class="link-btn">🛠️ REPARACIONES</a>
    <a href="#" class="link-btn" style="opacity:0.6; cursor:not-allowed">📝 SOLICITUD EDF</a>
    <a href="#" class="link-btn" style="opacity:0.6; cursor:not-allowed">🔔 NOTIFICACIONES</a>
    <button class="btn-logout-small" onclick="logoutHub()">Cerrar Sesión</button>
  </div>
</div>

<script>
// 👇👇 PONE TU URL DE GOOGLE APPS SCRIPT ACÁ 👇👇
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwreokQunVau5zi-QN-NzPz14IOfk11p4As3PYRqvSh1zqgbPosHJ9nX2RAfotacKxN/exec'; 

function doLoginHub() {
  const u = document.getElementById('user').value.trim().toUpperCase();
  const p = document.getElementById('pass').value.trim();
  const btn = document.querySelector('.btn-login');
  btn.textContent = 'Verificando...'; btn.disabled = true;

  const cb = 'cb_' + Date.now();
  const script = document.createElement('script');
  script.src = `${SCRIPT_URL}?action=login&usuario=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&callback=${cb}`;
  
  window[cb] = (data) => {
    delete window[cb]; document.body.removeChild(script);
    if (data.ok) {
      const session = { usuario: u, password: p, rol: data.rol, nombre: data.label, promotores: data.promotores };
      localStorage.setItem('user_session', JSON.stringify(session));
      mostrarMenu(session);
    } else {
      document.getElementById('loginErr').style.display = 'block';
      btn.textContent = 'Ingresar'; btn.disabled = false;
    }
  };
  document.body.appendChild(script);
}

function mostrarMenu(session) {
  document.getElementById('sectionLogin').style.display = 'none';
  document.getElementById('menuPrincipal').style.display = 'block';
  document.getElementById('labelNombre').textContent = session.nombre;
  document.getElementById('labelRol').textContent = session.rol;
}

function logoutHub() { localStorage.removeItem('user_session'); location.reload(); }

window.onload = () => {
  const s = localStorage.getItem('user_session');
  if (s) mostrarMenu(JSON.parse(s));
}
</script>
</body>
</html>
